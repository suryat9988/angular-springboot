@if (isAuthenticated()) {
  <mat-sidenav-container class="shell-container">
    <mat-sidenav
      #drawer
      [mode]="isMobile() ? 'over' : 'side'"
      [opened]="!isMobile()"
      class="app-sidenav"
    >
      <div class="brand-block">
        <img src="/bowerbird-logo.svg" alt="BowerBird logo" class="brand-logo" />
        <div>
          <h2>BowerBox</h2>
          <p>Date planning made simple</p>
        </div>
      </div>

      <mat-nav-list>
        <a
          mat-list-item
          routerLink="/upcoming-dates"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <mat-icon matListItemIcon>event</mat-icon>
          <span matListItemTitle>Upcoming Dates</span>
        </a>
        <a
          mat-list-item
          routerLink="/create-date-plan"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <mat-icon matListItemIcon>add_circle</mat-icon>
          <span matListItemTitle>Create Date Plan</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar class="app-toolbar">
        @if (isMobile()) {
          <button mat-icon-button aria-label="Open navigation menu" (click)="drawer.toggle()">
            <mat-icon>menu</mat-icon>
          </button>
        }
        <span class="toolbar-title">BowerBox</span>
        <span class="toolbar-spacer"></span>
        <span class="welcome-text">Hi, {{ displayName() }}</span>
        <button mat-stroked-button (click)="onSignOut()">Sign out</button>
      </mat-toolbar>

      <main class="content">
        <router-outlet />
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
