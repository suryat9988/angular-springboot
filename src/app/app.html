@if (isAuthenticated()) {
  <mat-sidenav-container class="shell-container">
    <mat-sidenav
      #drawer
      [mode]="isMobile() ? 'over' : 'side'"
      [opened]="!isMobile()"
      class="app-sidenav"
    >
      <div class="brand-block">
        <img src="/bowerbird-logo.svg" alt="BowerBird logo" class="brand-logo" />
        <div>
          <h2>BowerBox</h2>
          <p>Date planning made simple</p>
        </div>
      </div>

      <mat-nav-list>
        <a
          mat-list-item
          routerLink="/welcome"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="welcome" size="sm" />
          <span matListItemTitle>Welcome</span>
        </a>
        <a
          mat-list-item
          routerLink="/upcoming-dates"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="dates" size="sm" />
          <span matListItemTitle>Upcoming Dates</span>
        </a>
        <a
          mat-list-item
          routerLink="/partner-chat"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="chat" size="sm" />
          <span matListItemTitle>Partner Chat</span>
        </a>
        <a
          mat-list-item
          routerLink="/lucky-games"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="lucky-games" size="sm" />
          <span matListItemTitle>Lucky Games</span>
        </a>
        <a
          mat-list-item
          routerLink="/breakup-date-puzzle"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="breakup-puzzle" size="sm" />
          <span matListItemTitle>Breakup Date Puzzle</span>
        </a>
        <a
          mat-list-item
          routerLink="/create-date-plan"
          routerLinkActive="active-link"
          (click)="closeDrawerOnMobile(drawer)"
        >
          <app-icon matListItemIcon name="create-plan" size="sm" />
          <span matListItemTitle>Create Date Plan</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <mat-toolbar class="app-toolbar">
        @if (isMobile()) {
          <button mat-icon-button aria-label="Open navigation menu" (click)="drawer.toggle()">
            <app-icon name="menu" size="sm" />
          </button>
        }
        <span class="toolbar-title">BowerBox</span>
        <span class="toolbar-spacer"></span>
        <span class="welcome-text">Hi, {{ displayName() }}</span>
        <button mat-stroked-button (click)="onSignOut()">Sign out</button>
      </mat-toolbar>

      <main class="content">
        <router-outlet />
      </main>

      <footer class="app-footer">
        <a routerLink="/privacy">Privacy</a>
        <span aria-hidden="true">·</span>
        <a routerLink="/terms">Terms</a>
        <span aria-hidden="true">·</span>
        <span>18+ only</span>
      </footer>
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
